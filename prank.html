<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loading...</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #0f0;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* ── TAP OVERLAY ── */
#tap-overlay {
  position: fixed; inset: 0;
  background: #000;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  gap: 20px;
}
#tap-overlay .tap-icon { font-size: 4rem; animation: blink 1s infinite; }
#tap-overlay .tap-text {
  color: #fff;
  font-size: clamp(1rem, 4vw, 1.4rem);
  animation: blink 1s infinite;
  text-align: center;
  padding: 10px 20px;
  border: 2px solid #fff;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── PRANK SCREEN ── */
#prank { display: none; position: fixed; inset: 0; overflow: hidden; }

#matrix-canvas { position: absolute; inset: 0; z-index: 0; }

/* Crack overlay */
#crack-svg {
  position: absolute; inset: 0; z-index: 5;
  pointer-events: none; width: 100%; height: 100%;
}

/* Content */
#content {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 15px;
  gap: 8px;
  overflow: hidden;
}

/* Badge */
.badge {
  background: #ff0000; color: #fff;
  padding: 4px 14px;
  font-size: clamp(0.65rem, 2.8vw, 0.9rem);
  font-weight: bold;
  animation: flash-badge 0.4s infinite;
  border: 2px solid #fff;
  letter-spacing: 1px;
  margin-top: 10px;
}
@keyframes flash-badge {
  0%,100% { background:#ff0000; color:#fff; }
  50%      { background:#fff;    color:#ff0000; }
}

/* Main title */
.main-title {
  color: #ff0000;
  font-size: clamp(1.3rem, 6vw, 2.2rem);
  font-weight: bold;
  text-align: center;
  text-shadow: 0 0 12px #ff0000, 0 0 24px #ff0000;
  animation: shake 0.08s infinite, glitch 0.25s infinite;
  position: relative;
}
@keyframes shake {
  0%   { transform: translate(0,0) rotate(0deg); }
  20%  { transform: translate(-4px, 2px) rotate(-0.5deg); }
  40%  { transform: translate(4px, -3px) rotate(0.5deg); }
  60%  { transform: translate(-2px, -4px) rotate(-0.3deg); }
  80%  { transform: translate(3px, 3px) rotate(0.3deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}
@keyframes glitch {
  0%,100% { text-shadow: 0 0 12px #ff0000; color: #ff0000; }
  25%      { text-shadow: -3px 0 #00ffff, 3px 0 #ff00ff; color: #ff2200; }
  50%      { text-shadow: 3px 0 #00ff00, -3px 0 #ff0000; color: #ff0000; }
  75%      { text-shadow: 0 0 20px #ff0000; color: #ff6600; }
}

.subtitle {
  color: #ff4400;
  font-size: clamp(0.75rem, 3.2vw, 1.1rem);
  text-align: center;
  animation: shake 0.12s infinite;
}

/* Progress bars */
.scan-section {
  width: 92%; max-width: 400px;
  font-size: clamp(0.55rem, 2.4vw, 0.75rem);
}
.scan-label { color: #0f0; margin-bottom: 2px; }
.bar-outer {
  background: #001400; border: 1px solid #0f0;
  height: 10px; width: 100%; margin-bottom: 7px;
}
.bar-inner {
  height: 100%; background: #0f0; width: 0%;
  box-shadow: 0 0 6px #0f0;
  transition: width 0.08s linear;
}
.bar-inner.red { background: #ff0000; box-shadow: 0 0 6px #ff0000; }

/* Data stream */
#data-stream {
  width: 92%; max-width: 400px;
  font-size: clamp(0.48rem, 2vw, 0.65rem);
  height: 120px;
  overflow: hidden;
  border: 1px solid #0f0;
  padding: 5px 7px;
  background: rgba(0,15,0,0.6);
  color: #0f0;
  flex-shrink: 0;
}

/* Bottom warning */
.bottom-warn {
  color: #ffff00;
  font-size: clamp(0.6rem, 2.5vw, 0.8rem);
  text-align: center;
  animation: blink 0.6s infinite;
  margin-top: auto;
  padding-bottom: 10px;
}

/* Full-screen flash */
#flash {
  position: fixed; inset: 0; z-index: 50;
  background: #ff0000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.05s;
}

/* ── REVEAL SCREEN ── */
#reveal {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  align-items: center; justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 30px;
  animation: fadein 1.5s ease forwards;
}
@keyframes fadein { from{opacity:0} to{opacity:1} }
#reveal .r-emoji { font-size: clamp(3rem, 15vw, 5rem); margin-bottom: 20px; }
#reveal .r-msg {
  color: #fff;
  font-size: clamp(1.4rem, 6vw, 2.4rem);
  font-family: Georgia, serif;
  line-height: 1.5;
}
#reveal .r-sub {
  color: #aaa;
  font-size: clamp(0.9rem, 3.5vw, 1.2rem);
  margin-top: 15px;
  font-family: Georgia, serif;
}
#reveal .r-heart {
  font-size: clamp(2rem, 8vw, 3rem);
  margin-top: 20px;
  animation: heartbeat 0.8s infinite;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.3); }
}
</style>
</head>
<body>

<!-- TAP TO START (needed for mobile audio) -->
<div id="tap-overlay">
  <div class="tap-icon">📱</div>
  <div class="tap-text">TAP ANYWHERE TO CONTINUE</div>
</div>

<!-- PRANK SCREEN -->
<div id="prank">
  <canvas id="matrix-canvas"></canvas>

  <!-- Crack effect -->
  <svg id="crack-svg" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
    <g stroke="rgba(255,255,255,0.55)" stroke-width="1.2" fill="none" stroke-linecap="round">
      <polyline points="120,0 130,80 108,150 140,240 115,340 150,450 120,580 135,844"/>
      <polyline points="130,80 90,120 60,100"/>
      <polyline points="108,150 145,170 160,155"/>
      <polyline points="250,0 240,90 265,170 248,280 270,390 255,500 280,700 260,844"/>
      <polyline points="240,90 200,110 185,95"/>
      <polyline points="265,170 300,185 318,175"/>
      <polyline points="0,300 60,315 40,360 80,390"/>
      <polyline points="390,200 330,220 350,260 310,290"/>
      <polyline points="50,500 110,515 95,555"/>
      <polyline points="300,600 355,620 340,660 390,680"/>
    </g>
  </svg>

  <div id="content">
    <div class="badge">⚠ CRITICAL SECURITY BREACH DETECTED ⚠</div>
    <div class="main-title">⛔ DEVICE HACKED ⛔</div>
    <div class="subtitle">ALL YOUR DATA IS BEING EXTRACTED</div>

    <div class="scan-section">
      <div class="scan-label">📁 Scanning contacts... <span id="p1">0%</span></div>
      <div class="bar-outer"><div class="bar-inner" id="bar1"></div></div>

      <div class="scan-label">📸 Uploading photos... <span id="p2">0%</span></div>
      <div class="bar-outer"><div class="bar-inner" id="bar2"></div></div>

      <div class="scan-label">💬 Reading messages... <span id="p3">0%</span></div>
      <div class="bar-outer"><div class="bar-inner" id="bar3"></div></div>

      <div class="scan-label">🔑 Cracking passwords... <span id="p4">0%</span></div>
      <div class="bar-outer"><div class="bar-inner red" id="bar4"></div></div>
    </div>

    <div id="data-stream"></div>

    <div class="bottom-warn">⚡ DO NOT TURN OFF YOUR PHONE ⚡</div>
  </div>

  <div id="flash"></div>
</div>

<!-- REVEAL SCREEN -->
<div id="reveal">
  <div class="r-emoji">😄</div>
  <div class="r-msg">Just kidding!<br>Love you Dad!</div>
  <div class="r-sub">— Your child 😊</div>
  <div class="r-heart">❤️</div>
</div>

<script>
// ─────────────────────────────────────────────
//  MATRIX RAIN
// ─────────────────────────────────────────────
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
let drops = [], matrixTimer;

function initMatrix() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / 15);
  drops = Array(cols).fill(1);
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = '13px Courier New';
  drops.forEach((y, i) => {
    const r = Math.random();
    // Mix: green matrix chars, red "HACKED", white noise
    if (r > 0.97) {
      ctx.fillStyle = '#ffffff';
      ctx.fillText('!', i * 15, y * 15);
    } else if (r > 0.92) {
      ctx.fillStyle = '#ff0000';
      ctx.fillText(['H','A','C','K','E','D'][Math.floor(Math.random()*6)], i * 15, y * 15);
    } else {
      ctx.fillStyle = '#0f0';
      ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 15, y * 15);
    }
    if (y * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}

// ─────────────────────────────────────────────
//  AUDIO  (Web Audio API — no files needed)
// ─────────────────────────────────────────────
let audioCtx, sirenOsc, noiseSource, beepTimer;

function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // — Siren —
  sirenOsc = audioCtx.createOscillator();
  const sirenGain = audioCtx.createGain();
  sirenOsc.type = 'sawtooth';
  sirenOsc.frequency.value = 800;
  sirenGain.gain.value = 0.25;
  sirenOsc.connect(sirenGain);
  sirenGain.connect(audioCtx.destination);
  sirenOsc.start();

  (function sweep() {
    if (!sirenOsc) return;
    const t = audioCtx.currentTime;
    sirenOsc.frequency.linearRampToValueAtTime(1400, t + 0.7);
    sirenOsc.frequency.linearRampToValueAtTime(500,  t + 1.4);
    setTimeout(sweep, 1400);
  })();

  // — White noise static —
  const SR = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, SR * 2, SR);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = buf;
  noiseSource.loop = true;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.04;
  noiseSource.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseSource.start();

  // — Random alert beeps —
  function beep() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = 300 + Math.random() * 1600;
    g.gain.setValueAtTime(0.35, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
    beepTimer = setTimeout(beep, 150 + Math.random() * 700);
  }
  beep();
}

function stopAudio() {
  clearTimeout(beepTimer);
  try { sirenOsc && sirenOsc.stop(); } catch(e){}
  try { noiseSource && noiseSource.stop(); } catch(e){}
  try { audioCtx && audioCtx.close(); } catch(e){}
  sirenOsc = noiseSource = audioCtx = null;
}

// ─────────────────────────────────────────────
//  FAKE DATA STREAM
// ─────────────────────────────────────────────
const lines = [
  'REMOTE ACCESS: GRANTED',
  'FIREWALL: BYPASSED',
  'ROOT ACCESS: OBTAINED',
  'READING: WhatsApp messages...',
  'CONTACTS: 247 entries found',
  'UPLOADING: IMG_0041.jpg → remote server',
  'UPLOADING: IMG_0042.jpg → remote server',
  'GPS LOCATION: ACQUIRED',
  'BANKING APPS: 1 detected',
  'PASSWORDS: cracking...',
  'CAMERA: ENABLED SILENTLY',
  'MICROPHONE: STREAMING',
  'EMAIL ARCHIVE: COPYING...',
  'KERNEL: CORRUPTED',
  'SYSTEM FILES: DELETED',
  'SENDING DATA... 34% complete',
  'SENDING DATA... 67% complete',
  'SENDING DATA... 99% complete',
  'ERROR 0x00FF: CRITICAL FAILURE',
  'DISK WIPE: INITIATED',
];
const streamEl = document.getElementById('data-stream');
let dataTimer;

function addLine() {
  const d = document.createElement('div');
  d.textContent = '> ' + lines[Math.floor(Math.random() * lines.length)];
  d.style.color = Math.random() > 0.65 ? '#ff2200' : '#00ff00';
  streamEl.appendChild(d);
  if (streamEl.children.length > 22) streamEl.firstChild.remove();
  streamEl.scrollTop = streamEl.scrollHeight;
}

// ─────────────────────────────────────────────
//  PROGRESS BARS
// ─────────────────────────────────────────────
const barEls = [
  document.getElementById('bar1'),
  document.getElementById('bar2'),
  document.getElementById('bar3'),
  document.getElementById('bar4'),
];
const pctEls = [
  document.getElementById('p1'),
  document.getElementById('p2'),
  document.getElementById('p3'),
  document.getElementById('p4'),
];
const prg = [0, 0, 0, 0];
let barTimer;

function updateBars() {
  prg.forEach((v, i) => {
    prg[i] = Math.min(100, prg[i] + Math.random() * 4 + 0.5);
    barEls[i].style.width = prg[i] + '%';
    pctEls[i].textContent = Math.floor(prg[i]) + '%';
    if (prg[i] >= 100) prg[i] = 0;
  });
}

// ─────────────────────────────────────────────
//  RANDOM FLASH + INVERT
// ─────────────────────────────────────────────
const flashEl = document.getElementById('flash');
let flashTimer;

function doFlash() {
  if (Math.random() > 0.75) {
    flashEl.style.opacity = '0.5';
    setTimeout(() => { flashEl.style.opacity = '0'; }, 60 + Math.random() * 100);
  }
  if (Math.random() > 0.9) {
    document.body.style.filter = 'invert(1) hue-rotate(90deg)';
    setTimeout(() => { document.body.style.filter = ''; }, 80);
  }
  flashTimer = setTimeout(doFlash, 300 + Math.random() * 600);
}

// ─────────────────────────────────────────────
//  REVEAL
// ─────────────────────────────────────────────
function revealJoke() {
  stopAudio();
  clearInterval(matrixTimer);
  clearInterval(dataTimer);
  clearInterval(barTimer);
  clearTimeout(flashTimer);
  document.body.style.filter = '';
  document.getElementById('prank').style.display = 'none';
  const r = document.getElementById('reveal');
  r.style.display = 'flex';
}

// ─────────────────────────────────────────────
//  START  (on tap — required for mobile audio)
// ─────────────────────────────────────────────
document.getElementById('tap-overlay').addEventListener('click', function () {
  this.style.display = 'none';
  document.getElementById('prank').style.display = 'block';

  initMatrix();
  matrixTimer = setInterval(drawMatrix, 45);
  window.addEventListener('resize', initMatrix);

  startAudio();

  dataTimer = setInterval(addLine, 280);
  barTimer  = setInterval(updateBars, 120);
  doFlash();

  // Reveal after 20 seconds
  setTimeout(revealJoke, 20000);
});
</script>
</body>
</html>
